replicaCount: 1

image:
  repository: ghcr.io/o1-labs/uptime-navigator-lite
  tag: v0.1.0
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts: []
  tls: []

postgres:
  host: ""
  port: 5432
  db: ""
  user: ""
  password: ""
  sslmode: disable

whitelist: ""

extraEnv: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  failureThreshold: 5

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

deploymentAnnotations: {}
podAnnotations: {}
podLabels: {}

nodeSelector: {}
tolerations: []
affinity: {}
